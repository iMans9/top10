<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الـ 10 الملكي | النسخة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --royal-blue: #060d1d;
            --glass-blue: rgba(17, 34, 64, 0.8);
            --accent-gold: #f1c40f;
            --gold-gradient: linear-gradient(145deg, #f1c40f, #b8960c);
            --text-light: #e6f1ff;
            --error-red: #ff4d4d;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--royal-blue);
            background-image: radial-gradient(circle at center, #112240 0%, #060d1d 100%);
            color: var(--text-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* حركات الأنيميشن */
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGold { 0% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(241, 196, 15, 0); } 100% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); } }

        /* واجهة الإعداد */
        .glass-card {
            background: var(--glass-blue);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(241, 196, 15, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: slideIn 0.6s ease-out;
        }

        .names-container { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        .input-wrapper {
            display: flex; align-items: center; background: rgba(0,0,0,0.3);
            border-radius: 12px; border: 1px solid rgba(241, 196, 15, 0.2);
            transition: 0.3s; padding: 5px 15px;
        }
        .input-wrapper:focus-within { border-color: var(--accent-gold); transform: scale(1.02); }
        .input-wrapper input {
            background: transparent; border: none; color: white; padding: 12px;
            width: 100%; outline: none; font-family: 'Cairo'; font-size: 1rem;
        }

        select.category-select {
            width: 100%; padding: 12px; border-radius: 12px; background: #0a192f;
            color: var(--accent-gold); border: 1px solid var(--accent-gold);
            font-family: 'Cairo'; font-weight: 700; cursor: pointer;
        }

        /* واجهة اللعبة */
        #game-screen { display: none; width: 95%; max-width: 1000px; animation: slideIn 0.8s ease; }
        
        .scoreboard { display: flex; justify-content: space-around; align-items: center; margin-bottom: 30px; gap: 15px; }
        .score-card {
            background: var(--glass-blue); padding: 15px; border-radius: 20px;
            border: 2px solid transparent; transition: 0.4s; flex: 1; text-align: center;
        }
        .score-card.active { border-color: var(--accent-gold); animation: pulseGold 2s infinite; }
        .score-val { font-size: 3rem; font-weight: 900; color: var(--accent-gold); display: block; }
        .team-name { font-size: 1.2rem; font-weight: 700; opacity: 0.9; }

        .question-box {
            background: var(--gold-gradient); color: var(--royal-blue);
            padding: 20px; border-radius: 15px; margin-bottom: 25px;
            font-size: 1.4rem; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* شبكة الإجابات 2 في كل صف */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .cell {
            background: rgba(255,255,255,0.05); height: 60px; border-radius: 12px;
            border: 1px solid rgba(241, 196, 15, 0.2); display: flex; align-items: center;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;
        }
        .cell.revealed { background: rgba(241, 196, 15, 0.15); border-color: var(--accent-gold); transform: scale(1.02); }
        .cell-num {
            background: var(--accent-gold); color: var(--royal-blue); width: 50px; height: 100%;
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.3rem;
        }
        .cell-text { flex-grow: 1; text-align: center; font-weight: 700; font-size: 1.1rem; color: transparent; transition: 0.3s; }
        .cell.revealed .cell-text { color: white; }

        /* الأخطاء */
        .x-block {
            width: 50px; height: 50px; background: rgba(255,255,255,0.05);
            border: 2px solid #1d335a; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 900; border-radius: 12px; color: #1d335a; transition: 0.3s;
        }
        .x-block.active-x { color: var(--error-red); border-color: var(--error-red); text-shadow: 0 0 10px var(--error-red); }

        /* التحكم */
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        #ans-input {
            padding: 15px; border-radius: 12px; border: 1px solid var(--accent-gold);
            background: rgba(0,0,0,0.5); color: white; width: 300px; font-family: 'Cairo';
        }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--gold-gradient); color: var(--royal-blue); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* شرح اللعبة */
        #how-to-play {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 200;
        }

        #win-screen {
            position: fixed; inset: 0; background: var(--royal-blue);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 300;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="glass-card">
            <img src="https://raw.githubusercontent.com/iMans9/top10/refs/heads/main/top10.png" width="250px" style="filter: drop-shadow(0 0 10px var(--accent-gold));">
            <div class="names-container">
                <div class="input-wrapper"><span>🟢</span><input type="text" id="name-green" placeholder="اسم الفريق الأول"></div>
                <div class="input-wrapper"><span>🟠</span><input type="text" id="name-orange" placeholder="اسم الفريق الثاني"></div>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:10px; font-weight:700;">اختر الفئة 📂</label>
                <select id="category-select" class="category-select">
                    <option value="كرة قدم">كرة قدم ⚽</option>
                    <option value="السعودية">السعودية 🇸🇦</option>
                    <option value="اختراعات">اختراعات 💡</option>
                    <option value="آثار">تاريخ وآثار 🏛️</option>
                    <option value="حيوانات">حيوانات 🦁</option>
                    <option value="جسم الإنسان">جسم الإنسان 🧠</option>
                </select>
            </div>
            <button class="btn btn-primary" style="width: 100%; font-size: 1.2rem;" onclick="showInstructions()">دخول التحدي 🔥</button>
        </div>
    </div>

    <div id="how-to-play">
        <div class="glass-card" style="max-width: 400px;">
            <h2 style="color: var(--accent-gold);">📜 كيف تلعب؟</h2>
            <p style="text-align: right; line-height: 1.8;">
                • هناك 10 إجابات مخفية لكل سؤال.<br>
                • نقاطك تزيد حسب صعوبة ترتيب الإجابة.<br>
                • المركز (1) = نقطة، المركز (10) = 10 نقاط.<br>
                • لكل فريق 3 محاولات خاطئة فقط.<br>
                • أول فريق يصل لـ <b>200 نقطة</b> يفوز!
            </p>
            <button class="btn btn-primary" style="width: 100%;" onclick="startGame()">ابدأ التحدي الآن 🚀</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="scoreboard">
            <div class="score-card" id="card-green">
                <span class="team-name" id="display-name-green">الفريق 1</span>
                <span class="score-val" id="score-green">0</span>
                <div class="x-container" style="display:flex; gap:5px; justify-content:center; margin-top:10px;">
                    <div class="x-block">X</div><div class="x-block">X</div><div class="x-block">X</div>
                </div>
            </div>
            <div class="score-card" id="card-orange">
                <span class="team-name" id="display-name-orange">الفريق 2</span>
                <span class="score-val" id="score-orange">0</span>
                <div class="x-container" style="display:flex; gap:5px; justify-content:center; margin-top:10px;">
                    <div class="x-block">X</div><div class="x-block">X</div><div class="x-block">X</div>
                </div>
            </div>
        </div>

        <div class="question-box" id="q-text">جاري التحميل...</div>
        
        <div class="grid" id="grid"></div>

        <div class="controls">
            <input type="text" id="ans-input" placeholder="اكتب إجابتك هنا..." onkeypress="if(event.key==='Enter') submitAns()">
            <button class="btn btn-primary" onclick="submitAns()">إرسال ✅</button>
            <button class="btn btn-secondary" onclick="revealAll()">كشف 👁️</button>
            <button class="btn btn-secondary" style="color:var(--accent-gold)" onclick="openChangeCategory()">تغيير الفئة 🔄</button>
        </div>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 5rem; color: var(--accent-gold); margin: 0;">🏆 كفووو! 🏆</h1>
        <h2 id="winner-name" style="font-size: 3rem; margin: 10px 0 30px 0;"></h2>
        <button class="btn btn-primary" style="padding: 20px 60px; font-size: 1.5rem;" onclick="location.reload()">لعبة جديدة 🔄</button>
    </div>

    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>

    <script>
        let allQuestionsRaw = [];
        let currentQData = null;
        let scores = { green: 0, orange: 0 };
        let errors = { green: 0, orange: 0 };
        let outTeams = { green: false, orange: false };
        let turn = 'green';
        const TARGET_SCORE = 200;

        // جلب الأسئلة من الملف الخارجي
        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                allQuestionsRaw = await response.json();
                console.log("الأسئلة جاهزة!");
            } catch (e) { console.error("فشل تحميل الأسئلة"); }
        }

        function showInstructions() {
            document.getElementById('how-to-play').style.display = 'flex';
        }

        function startGame() {
            document.getElementById('how-to-play').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            document.getElementById('display-name-green').innerText = document.getElementById('name-green').value || "الفريق الأول";
            document.getElementById('display-name-orange').innerText = document.getElementById('name-orange').value || "الفريق الثاني";
            
            loadQuestion();
        }

        function loadQuestion() {
            const cat = document.getElementById('category-select').value;
            const filtered = allQuestionsRaw.filter(q => q.category === cat);
            
            if (filtered.length === 0) {
                alert("لا توجد أسئلة في هذه الفئة");
                return;
            }

            currentQData = filtered[Math.floor(Math.random() * filtered.length)];
            document.getElementById('q-text').innerText = currentQData.q;
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            currentQData.a.forEach((item, i) => {
                grid.innerHTML += `
                    <div class="cell" id="c-${i}">
                        <div class="cell-num">${i+1}</div>
                        <div class="cell-text" data-info="${item.i}">${item.k[0]}</div>
                    </div>`;
            });
            resetRoundUI();
            updateUI();
        }

        function normalizeText(text) {
            return text ? text.trim().replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ئ/g, 'ي').replace(/\s+/g, '') : "";
        }

        function submitAns() {
            if (outTeams[turn] || !currentQData) return;
            const input = normalizeText(document.getElementById('ans-input').value);
            if (!input) return;

            let found = false;
            currentQData.a.forEach((item, i) => {
                const cell = document.getElementById(`c-${i}`);
                const isMatch = item.k.some(key => {
                    const cleanKey = normalizeText(key);
                    return input === cleanKey || (input.length >= 3 && cleanKey.includes(input));
                });

                if (!cell.classList.contains('revealed') && isMatch) {
                    cell.classList.add('revealed');
                    const info = cell.querySelector('.cell-text').getAttribute('data-info');
                    cell.querySelector('.cell-text').innerText += ` (${info})`;
                    scores[turn] += (i + 1);
                    found = true;
                }
            });

            if (found) {
                document.getElementById('snd-correct').play();
            } else {
                errors[turn]++;
                document.getElementById('snd-wrong').play();
                const blocks = document.getElementById(`card-${turn}`).querySelectorAll('.x-block');
                if (blocks[errors[turn]-1]) blocks[errors[turn]-1].classList.add('active-x');
                if (errors[turn] >= 3) {
                    outTeams[turn] = true;
                    document.getElementById(`card-${turn}`).style.opacity = "0.4";
                }
            }

            // تبديل الدور
            let next = (turn === 'green') ? 'orange' : 'green';
            if (!outTeams[next]) turn = next;
            
            document.getElementById('ans-input').value = '';
            updateUI();
            checkWinner();
        }

        function updateUI() {
            document.getElementById('score-green').innerText = scores.green;
            document.getElementById('score-orange').innerText = scores.orange;
            document.querySelectorAll('.score-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${turn}`).classList.add('active');
        }

        function checkWinner() {
            if (scores.green >= TARGET_SCORE || scores.orange >= TARGET_SCORE) {
                const winName = scores.green >= TARGET_SCORE ? 
                    document.getElementById('display-name-green').innerText : 
                    document.getElementById('display-name-orange').innerText;
                document.getElementById('winner-name').innerText = winName;
                document.getElementById('win-screen').style.display = 'flex';
                confetti({ particleCount: 500, spread: 100 });
            }
        }

        function resetRoundUI() {
            errors = { green: 0, orange: 0 };
            outTeams = { green: false, orange: false };
            document.querySelectorAll('.x-block').forEach(x => x.classList.remove('active-x'));
            document.querySelectorAll('.score-card').forEach(c => c.style.opacity = "1");
        }

        function openChangeCategory() {
            document.getElementById('setup-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'none';
        }

        function revealAll() {
            document.querySelectorAll('.cell').forEach(c => c.classList.add('revealed'));
        }

        loadQuestions();
    </script>
</body>
</html>
