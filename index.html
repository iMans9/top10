<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الـ 10 الملكي | النسخة الذهبية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue: #0a192f;
            --mid-blue: #112240;
            --accent-gold: #f1c40f;
            --soft-gold: #ffecb3;
            --text-light: #e6f1ff;
            --error-red: #ff4d4d;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--royal-blue);
            color: var(--text-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            perspective: 1000px;
            overflow-x: hidden;
        }

        /* واجهة الإعداد */
        #setup-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, var(--mid-blue) 0%, var(--royal-blue) 100%);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .setup-card {
            background: var(--mid-blue);
            padding: 40px;
            border-radius: 30px;
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        /* تنسيق حاوية الأسماء المطور */
        .names-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px; align-items: center; }
        .input-wrapper {
            position: relative; width: 90%; display: flex; align-items: center;
            background: rgba(10, 25, 47, 0.6); border: 2px solid rgba(241, 196, 15, 0.3);
            border-radius: 15px; transition: all 0.4s;
        }
        .input-wrapper:focus-within { border-color: var(--accent-gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); transform: scale(1.02); }
        .input-icon { padding: 0 15px; font-size: 1.2rem; }
        #names-inputs input {
            width: 100%; border: none; background: transparent; padding: 15px 10px;
            color: var(--accent-gold); font-size: 1.1rem; outline: none; font-family: 'Cairo';
        }
        .category-select {
            padding: 12px; border: 2px solid var(--accent-gold); border-radius: 10px;
            width: 85%; font-size: 1.1rem; font-family: 'Cairo'; font-weight: 700;
            background: var(--royal-blue); color: white; margin-bottom: 15px;
        }

        /* لوحة اللعبة */
        #game-screen { display: none; width: 95%; max-width: 1100px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .scoreboard { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; }
        .score-box {
            background: linear-gradient(145deg, var(--accent-gold), #b8960c); color: var(--royal-blue); 
            padding: 15px 30px; font-size: 3rem; font-weight: 900; border-radius: 15px;
            box-shadow: 0 10px 0 #8a7106; min-width: 80px;
        }
        .team-name-card {
            background: var(--mid-blue); padding: 15px 25px; font-size: 1.5rem;
            font-weight: 900; border: 2px solid var(--accent-gold); border-radius: 10px;
        }
        .team-name-card.active { box-shadow: 0 0 20px var(--accent-gold); transform: scale(1.05); background: #1d335a; }
        .team-name-card.out { opacity: 0.3; filter: grayscale(1); }

        .question-box {
            background: var(--mid-blue); color: var(--accent-gold); padding: 25px;
            border: 2px solid var(--accent-gold); border-radius: 15px;
            text-align: center; margin-bottom: 30px; font-size: 1.2rem;
        }

        .grid { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 650px; margin: 0 auto 30px; }
        .cell {
            background: var(--mid-blue); height: 55px; border: 1.5px solid var(--accent-gold);
            display: flex; align-items: center; position: relative; border-radius: 8px;
            overflow: hidden; transition: 0.5s;
        }
        .cell.revealed { background: #1d335a; border-color: white; transform: rotateX(360deg); }
        .cell-num {
            background: var(--accent-gold); color: var(--royal-blue); width: 55px; height: 100%;
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.4rem;
        }
        .cell-text { flex-grow: 1; text-align: center; font-weight: 900; color: transparent; font-size: 1.5rem; }
        .cell.revealed .cell-text { color: var(--accent-gold); }

        .x-block {
            width: 50px; height: 50px; background: var(--mid-blue);
            border: 2px solid var(--accent-gold); display: flex; align-items: center;
            justify-content: center; font-size: 2rem; font-weight: 900; color: #1a2a44; border-radius: 10px;
        }
        .x-block.active-x { color: var(--error-red); border-color: var(--error-red); box-shadow: 0 0 10px var(--error-red); }

        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        #ans-input { 
            padding: 15px; border: 2px solid var(--accent-gold); border-radius: 12px; 
            width: 300px; background: var(--mid-blue); color: white; font-weight: 700; font-size: 1.1rem;
        }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: var(--accent-gold); color: var(--royal-blue); }
        .btn-blue { background: #233554; color: var(--accent-gold); border: 1px solid var(--accent-gold); }

        #win-screen { position: fixed; inset: 0; background: var(--royal-blue); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>

        let currentQData = null; // تخزين السؤال العشوائي الحالي
        const TARGET_SCORE = 200;

        function startGame() {
            const n1 = document.getElementById('name-green').value || "الفريق 1";
            const n2 = document.getElementById('name-orange').value || "الفريق 2";
            document.getElementById('card-green').innerText = n1;
            document.getElementById('card-orange').innerText = n2;
            
            currentCat = document.getElementById('category-select').value;
            resetRoundState();
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            loadQuestion();
        }

        function openChangeCategory() {
            document.getElementById('names-inputs').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'flex';
        }

        function resetRoundState() {
            errors = { green: 0, orange: 0 };
            outTeams = { green: false, orange: false };
            document.querySelectorAll('.x-block').forEach(b => b.classList.remove('active-x'));
            document.getElementById('card-green').classList.remove('out');
            document.getElementById('card-orange').classList.remove('out');
        }

        function loadQuestion() {
            const questionsList = allQuestions[currentCat];
            // اختيار عشوائي من المصفوفة
            const randomIndex = Math.floor(Math.random() * questionsList.length);
            currentQData = questionsList[randomIndex];
            
            document.getElementById('q-text').innerText = currentQData.q;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            currentQData.a.forEach((item, i) => {
                grid.innerHTML += `
                    <div class="cell" id="c-${i}">
                        <div class="cell-num">${i+1}</div>
                        <div class="cell-text">${item.k[0]}</div>
                    </div>`;
            });
            updateUI();
        }

// 1. دالة تنظيف النصوص (توضع في بداية السكربت أو قبل دالة submitAns)
function normalizeText(text) {
    if (!text) return "";
    return text.trim()
        .replace(/[أإآ]/g, 'ا') // تحويل كل أشكال الألف إلى ا
        .replace(/ة/g, 'ه')    // تحويل التاء المربوطة إلى هاء
        .replace(/\s+/g, '');  // إزالة المسافات تماماً لضمان التطابق
}

// 2. دالة التحقق المحدثة
function submitAns() {
    if (outTeams[turn] || !currentQData) return;
    
    // تنظيف ما كتبه المستخدم
    const userInput = normalizeText(document.getElementById('ans-input').value);
    
    if (!userInput) return;

    let found = false;
    currentQData.a.forEach((item, i) => {
        const cell = document.getElementById(`c-${i}`);
        
        // التحقق من الإجابات المخزنة بعد تنظيفها أيضاً
        const isMatch = item.k.some(key => {
            const cleanKey = normalizeText(key);
            // المقارنة الآن تتجاهل الهمزات والتاء المربوطة والمسافات
            return userInput === cleanKey || cleanKey.includes(userInput);
        });

        if (!cell.classList.contains('revealed') && isMatch) {
            cell.classList.add('revealed');
            scores[turn] += (i + 1); 
            found = true;
        }
    });

    if (found) {
        document.getElementById('snd-correct').play();
    } else {
        errors[turn]++;
        document.getElementById('snd-wrong').play();
        const blocks = document.getElementById(`x-${turn}`).querySelectorAll('.x-block');
        if (blocks[errors[turn] - 1]) blocks[errors[turn] - 1].classList.add('active-x');
        
        if (errors[turn] >= 3) {
            outTeams[turn] = true;
            document.getElementById(`card-${turn}`).classList.add('out');
        }
    }
    
    // تبديل الدور للفريق الآخر
    let nextTurn = (turn === 'green') ? 'orange' : 'green';
    if (!outTeams[nextTurn]) turn = nextTurn;
    
    document.getElementById('ans-input').value = '';
    updateUI();
    checkWinCondition();
}

        function updateUI() {
            document.getElementById('score-green').innerText = scores.green;
            document.getElementById('score-orange').innerText = scores.orange;
            document.getElementById('card-green').classList.toggle('active', turn === 'green');
            document.getElementById('card-orange').classList.toggle('active', turn === 'orange');
        }

        function checkWinCondition() {
            if(scores.green >= TARGET_SCORE || scores.orange >= TARGET_SCORE) {
                const winner = scores.green >= TARGET_SCORE ? document.getElementById('card-green').innerText : document.getElementById('card-orange').innerText;
                document.getElementById('winner-name').innerText = winner;
                document.getElementById('win-screen').style.display = 'flex';
                confetti({ particleCount: 500, spread: 160, colors: ['#f1c40f', '#ffffff'] });
            }
        }

        function revealAll() {
            document.querySelectorAll('.cell').forEach(c => c.classList.add('revealed'));
        }
